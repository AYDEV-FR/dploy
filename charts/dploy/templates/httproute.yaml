{{- if .Values.httpRoute.enabled -}}
{{/*
Exposes the dploy API via the Gateway API. Mutually-independent of
ingress.enabled — you can run both during a migration, but typically pick one.
Hostnames default to [ingress.host] when ingress is set (single source of truth
for the public hostname) and can be overridden via httpRoute.hostnames.
*/}}
{{- $fullName := include "dploy.fullname" . -}}
{{- $hostnames := .Values.httpRoute.hostnames -}}
{{- if not $hostnames -}}{{- $hostnames = list .Values.ingress.host -}}{{- end -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dploy.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  hostnames:
    {{- toYaml $hostnames | nindent 4 }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $fullName }}
          port: {{ .Values.service.port }}
{{- end }}
