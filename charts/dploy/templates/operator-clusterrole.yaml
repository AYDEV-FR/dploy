{{- if .Values.operator.enabled -}}
{{/*
The operator is the ONLY identity that touches Flux and workload namespaces.
These rules mirror config/rbac/role.yaml (generated from the controllers' RBAC
markers); keep them in sync with `make manifests`.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dploy.operator.fullname" . }}
  labels:
    {{- include "dploy.operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [create, delete, get, list, watch, update, patch]
  - apiGroups: [dploy.dev]
    resources: [dployinstances, dploytemplates, operatorconfigs]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [dploy.dev]
    resources: [dployinstances/finalizers, dploytemplates/finalizers]
    verbs: [update]
  - apiGroups: [dploy.dev]
    resources: [dployinstances/status, dploytemplates/status, operatorconfigs/status]
    verbs: [get, patch, update]
  - apiGroups: [helm.toolkit.fluxcd.io]
    resources: [helmreleases]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [source.toolkit.fluxcd.io]
    resources: [gitrepositories, helmrepositories, ocirepositories]
    verbs: [create, delete, get, list, patch, update, watch]
  {{- if .Values.operator.leaderElection }}
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create, get, list, watch, update, patch, delete]
  {{- end }}
{{- end }}
