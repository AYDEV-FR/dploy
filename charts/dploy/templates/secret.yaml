apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dploy.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dploy.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWKS_URL: {{ .Values.auth.jwksURL | quote }}
  JWT_ISSUER: {{ .Values.auth.jwtIssuer | quote }}
  {{- if .Values.auth.oidcIssuer }}
  OIDC_ISSUER: {{ .Values.auth.oidcIssuer | quote }}
  {{- end }}
  {{- if .Values.auth.oidcPublicIssuer }}
  OIDC_PUBLIC_ISSUER: {{ .Values.auth.oidcPublicIssuer | quote }}
  {{- end }}
  {{- if .Values.auth.oidcClientSecret }}
  OIDC_CLIENT_SECRET: {{ .Values.auth.oidcClientSecret | quote }}
  {{- end }}
  {{/* Cookie keys for the zitadel/oidc state + PKCE cookies. When unset the
       API generates per-process random keys (logs a warning) — fine for a
       single replica; mandatory for replicaCount > 1 or rolling-update
       resilience. Generate with `head -c 64 /dev/urandom | base64`. */}}
  {{- if .Values.auth.oidcCookieHashKey }}
  OIDC_COOKIE_HASH_KEY: {{ .Values.auth.oidcCookieHashKey | quote }}
  {{- end }}
  {{- if .Values.auth.oidcCookieBlockKey }}
  OIDC_COOKIE_BLOCK_KEY: {{ .Values.auth.oidcCookieBlockKey | quote }}
  {{- end }}
