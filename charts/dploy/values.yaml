# Dploy Helm Chart Values
#
# The chart deploys two components:
#   * the API server (GoFiber + OIDC) — reads the catalog and creates instances
#   * the operator — reconciles DployInstance/DployTemplate into Flux resources
# CRDs are installed from the chart's crds/ directory.

# ---------------------------------------------------------------------------
# API server
# ---------------------------------------------------------------------------
replicaCount: 1

# Rollout strategy. The default avoids a surge pod (maxSurge: 0) so upgrades
# succeed on capacity-constrained (e.g. single-node) clusters: the old pod is
# terminated first, then the new one is scheduled into the freed slot.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

image:
  repository: ghcr.io/aydev-fr/dploy
  pullPolicy: IfNotPresent
  tag: "main"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Dploy API configuration
config:
  # Namespace where DployTemplate/DployInstance CRs live.
  # Empty string defaults to the release namespace.
  namespace: ""
  maxEnvironmentsPerUser: 5
  defaultTTL: 86400 # 24h, fallback when a template omits TTL
  extendTTL: 7200   # 2h, fallback extension granted per /extend
  serverHost: "0.0.0.0"
  serverPort: 8080
  # UI feature flags. When false, the matching nav link is hidden in the web UI
  # AND the matching API endpoint is not registered (returns 404). Setting both
  # to false yields a run-only deployment: login + /run/:env still work.
  catalogEnabled: true
  instancesListEnabled: true
  # Manager UI: cluster-wide admin view (lists all instances across owners).
  # When true, the link is shown in the navbar ONLY to users whose JWT claims
  # match auth.adminClaim / auth.adminValue below; when false, hidden for all
  # and /api/admin/* returns 404.
  managerEnabled: true

# OIDC/JWT configuration
auth:
  jwksURL: ""
  jwtIssuer: ""
  jwtAudience: dploy

  # Admin detection from the JWT. Examples:
  #   adminClaim: is_admin   adminValue: "true"     (boolean claim)
  #   adminClaim: role       adminValue: "admin"    (string claim)
  #   adminClaim: groups     adminValue: "admin"    (list-membership claim)
  adminClaim: is_admin
  adminValue: "true"
  jwtUsernameClaim: preferred_username
  oidcClientID: dploy
  oidcClientSecret: ""
  oidcIssuer: ""
  oidcPublicIssuer: ""
  oidcRedirectURL: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  annotations: {}
  host: dploy.example.com
  tls: []
  #  - secretName: dploy-tls
  #    hosts:
  #      - dploy.example.com

# Gateway API HTTPRoute — alternative to Ingress for clusters running the
# Gateway API (Cilium agentgateway, envoy-gateway, istio, …). May coexist with
# ingress.enabled (both work concurrently), but typically you'd pick exactly
# one. Routes "/" to the dploy API service. Hostnames default to [ingress.host]
# when not set, so a single source of truth covers both routing layers.
httpRoute:
  enabled: false
  # parentRefs: list of Gateways this route attaches to (required when enabled).
  parentRefs: []
  #   - name: my-gateway
  #     namespace: gateway-system
  # hostnames: defaults to [ingress.host] when empty; override to claim a
  # different hostname than the Ingress.
  hostnames: []
  # annotations: e.g. external-dns target for the parent Gateway's address.
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------------------
# Operator
# ---------------------------------------------------------------------------
operator:
  enabled: true
  replicaCount: 1
  # Enable leader election to run more than one replica safely.
  leaderElection: false

  # See the API strategy note above: no surge pod, so the rollout fits a full node.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  image:
    repository: ghcr.io/aydev-fr/dploy-operator
    pullPolicy: IfNotPresent
    tag: "main"

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true

  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    capabilities:
      drop:
        - ALL

# CRDs are installed from the chart's crds/ directory on `helm install`.
# Helm does not upgrade CRDs automatically — run `make install`
# (kubectl apply -f config/crd/bases) to update them on chart upgrades.
