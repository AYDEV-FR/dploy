---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: dploytemplates.dploy.dev
spec:
  group: dploy.dev
  names:
    kind: DployTemplate
    listKind: DployTemplateList
    plural: dploytemplates
    shortNames:
    - dtpl
    singular: dploytemplate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.method
      name: Method
      type: string
    - jsonPath: .spec.engine
      name: Engine
      type: string
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .status.poolAvailable
      name: Available
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DployTemplate defines a deployable environment available in the
          Dploy catalog.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DployTemplateSpec defines a deployable catalog entry.
            properties:
              category:
                description: Category groups templates in the UI, format "category,subcategory".
                type: string
              chart:
                description: Chart is the Helm chart source.
                properties:
                  chart:
                    description: Chart is the chart name within a Helm repository
                      (used when type=helm).
                    type: string
                  path:
                    description: Path is the chart path within a git repository (used
                      when type=git).
                    type: string
                  repoURL:
                    description: RepoURL is the git repository URL or Helm repository
                      URL.
                    minLength: 1
                    type: string
                  targetRevision:
                    default: main
                    description: TargetRevision is the git ref (branch/tag/sha) or
                      chart version.
                    type: string
                  type:
                    default: git
                    description: Type selects between a git repository (path) or a
                      Helm repository (chart name).
                    enum:
                    - git
                    - helm
                    type: string
                required:
                - repoURL
                type: object
              connectionURLTemplate:
                description: |-
                  ConnectionURLTemplate overrides OperatorConfig.connectionURLTemplate for this
                  template. Go (text/template) rendered with .Owner, .UUID, .BaseDomain,
                  .Template, .Params and .Claims.
                type: string
              description:
                description: Description is shown in the catalog listing.
                type: string
              displayName:
                description: DisplayName is the human-friendly name shown in the UI.
                type: string
              enabled:
                default: true
                description: Enabled gates whether instances may be created from this
                  template.
                type: boolean
              engine:
                description: Engine overrides OperatorConfig.defaultEngine for this
                  template.
                enum:
                - argocd
                - flux
                type: string
              icon:
                description: Icon is the UI icon identifier.
                type: string
              maxInstancesPerUser:
                description: MaxInstancesPerUser overrides the per-user quota for
                  this template.
                type: integer
              method:
                default: on-demand
                description: Method selects on-demand provisioning or a pre-warmed
                  pool.
                enum:
                - on-demand
                - pool
                type: string
              ownerClaim:
                description: |-
                  OwnerClaim selects which JWT claim identifies the owner ("primary key") of
                  instances created from this template. The claim value is sanitized and used
                  for the owner label, per-owner quota, instance naming and listing. Examples:
                  "preferred_username" for per-user environments, or "groups" for a team-shared
                  environment that everyone in the group sees and reuses. Empty falls back to
                  the API's configured username claim. Multi-valued claims use their first value.
                type: string
              parameters:
                description: Parameters declares request-supplied values exposed to
                  templates as `.Params`.
                items:
                  description: TemplateParameter declares a value a request may supply,
                    exposed to templates as `.Params`.
                  properties:
                    default:
                      description: Default is used when a request omits the parameter.
                      type: string
                    description:
                      description: Description documents the parameter.
                      type: string
                    name:
                      description: Name is the parameter key.
                      minLength: 1
                      type: string
                    required:
                      description: Required rejects requests that omit this parameter
                        when no default is set.
                      type: boolean
                  required:
                  - name
                  type: object
                type: array
              pool:
                description: Pool configures pre-warming; required when method is
                  "pool".
                properties:
                  maxSize:
                    description: MaxSize caps the total number of instances (idle
                      + claimed). 0 means unlimited.
                    minimum: 0
                    type: integer
                  recycle:
                    default: true
                    description: |-
                      Recycle controls whether a claimed instance is destroyed and replaced on release,
                      keeping the pool fresh and preventing state leakage between users. Defaults to true.
                    type: boolean
                  size:
                    description: Size is the number of warm, idle instances to keep
                      available for claiming.
                    minimum: 0
                    type: integer
                required:
                - size
                type: object
              ttl:
                description: TTL configures instance lifetime; falls back to OperatorConfig
                  defaults when unset.
                properties:
                  extendSeconds:
                    description: ExtendSeconds is the number of seconds added per
                      extension. 0 falls back to OperatorConfig defaults.
                    format: int64
                    minimum: 0
                    type: integer
                  maxExtends:
                    description: MaxExtends is the maximum number of extensions allowed.
                      -1 means unlimited, 0 falls back to defaults.
                    type: integer
                  seconds:
                    description: Seconds is the initial time-to-live in seconds. -1
                      means unlimited (never expires).
                    format: int64
                    type: integer
                type: object
              valueFiles:
                description: ValueFiles lists values file paths within the chart repository.
                items:
                  type: string
                type: array
              valuesTemplate:
                description: ValuesTemplate is a Go (text/template + sprig) template
                  rendered to Helm values YAML.
                type: string
              visible:
                description: Visible controls listing in the UI/API. Hidden templates
                  remain runnable by name. Defaults to true.
                type: boolean
            required:
            - chart
            - enabled
            type: object
          status:
            description: DployTemplateStatus reports pool occupancy and readiness.
            properties:
              conditions:
                description: Conditions represent the latest observations of the template's
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              poolAvailable:
                description: PoolAvailable is the number of warm, unclaimed instances
                  ready to be claimed.
                type: integer
              poolClaimed:
                description: PoolClaimed is the number of pooled instances currently
                  claimed by users.
                type: integer
              poolTotal:
                description: PoolTotal is the total number of instances derived from
                  this template.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
