<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dploy - Lancement environnement</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .run-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background: var(--surface);
            border-radius: 12px;
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            margin: 20px 0;
            font-size: 18px;
            color: var(--text-secondary);
        }

        .env-info {
            margin: 30px 0;
            padding: 20px;
            background: var(--bg);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .env-name {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .error-message {
            color: var(--danger);
            margin: 20px 0;
            padding: 15px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid var(--danger);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="run-container">
        <h1>🚀 Dploy</h1>
        <div id="content"></div>
    </div>

    <script>
        const TOKEN_KEY = 'dploy_token';
        const API_BASE = '';

        // Extract environment name from URL path
        const pathParts = window.location.pathname.split('/');
        const envName = pathParts[pathParts.length - 1];

        let pollInterval = null;

        // Check for token in hash fragment (OAuth callback)
        const hash = window.location.hash;
        if (hash && hash.startsWith('#token=')) {
            const token = hash.substring(7); // Remove '#token='
            console.log('Token found in hash, storing in localStorage');
            localStorage.setItem(TOKEN_KEY, token);
            // Clean URL hash
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        async function checkAuth() {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) {
                // No token, redirect to OAuth login with return URL
                const returnUrl = encodeURIComponent(window.location.pathname);
                window.location.href = `/auth/login?returnUrl=${returnUrl}`;
                return false;
            }
            return token;
        }

        async function createEnvironment(token) {
            try {
                const response = await fetch(`${API_BASE}/api/run/${envName}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    // Token expired, redirect to login
                    localStorage.removeItem(TOKEN_KEY);
                    const returnUrl = encodeURIComponent(window.location.pathname);
                    window.location.href = `/auth/login?returnUrl=${returnUrl}`;
                    return null;
                }

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Erreur lors de la création');
                }

                return await response.json();
            } catch (error) {
                console.error('Error creating environment:', error);
                throw error;
            }
        }

        async function checkStatus(token) {
            try {
                const response = await fetch(`${API_BASE}/api/run/${envName}/status`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to check status');
                }

                return await response.json();
            } catch (error) {
                console.error('Error checking status:', error);
                return null;
            }
        }

        function showLoading(message) {
            document.getElementById('content').innerHTML = `
                <div class="env-info">
                    <div class="env-name">${envName}</div>
                </div>
                <div class="spinner"></div>
                <div class="status">${message}</div>
                <div class="progress-bar">
                    <div class="progress-bar-fill"></div>
                </div>
            `;
        }

        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="env-info">
                    <div class="env-name">${envName}</div>
                </div>
                <div class="error-message">
                    ❌ ${message}
                </div>
                <button onclick="window.location.reload()" class="btn btn-primary">
                    Réessayer
                </button>
            `;
        }

        async function pollStatus(token, envUrl) {
            const status = await checkStatus(token);

            if (!status) {
                return;
            }

            console.log('Status:', status.status);

            if (status.status === 'Healthy' || status.status === 'healthy') {
                // Environment is ready, redirect
                if (pollInterval) {
                    clearInterval(pollInterval);
                }

                showLoading(`✅ Environnement prêt ! Redirection...`);
                setTimeout(() => {
                    window.location.href = envUrl;
                }, 1500);
            } else if (status.status === 'Degraded' || status.status === 'degraded') {
                showError('L\'environnement est en état dégradé. Vérifiez les logs ArgoCD.');
                if (pollInterval) {
                    clearInterval(pollInterval);
                }
            } else if (status.status === 'Missing' || status.status === 'missing') {
                showError('L\'environnement n\'existe pas.');
                if (pollInterval) {
                    clearInterval(pollInterval);
                }
            } else if (status.status === 'Deleting' || status.status === 'deleting') {
                showError('L\'environnement est en cours de suppression.');
                if (pollInterval) {
                    clearInterval(pollInterval);
                }
            }
            // Otherwise keep polling (Progressing, Unknown, etc.)
        }

        async function startPolling(token, envUrl) {
            // Poll immediately
            await pollStatus(token, envUrl);

            // Then poll every 2 seconds
            pollInterval = setInterval(() => pollStatus(token, envUrl), 2000);
        }

        async function main() {
            showLoading('Vérification authentification...');

            const token = await checkAuth();
            if (!token) return;

            showLoading('Création de l\'environnement...');

            try {
                const result = await createEnvironment(token);

                if (!result) {
                    return; // Redirected to login
                }

                console.log('Environment created:', result);

                showLoading(`Déploiement en cours...<br><small>UUID: ${result.uuid}</small>`);

                // Start polling for status
                await startPolling(token, result.url);

            } catch (error) {
                showError(error.message);
            }
        }

        // Start the flow
        main();
    </script>
</body>
</html>
