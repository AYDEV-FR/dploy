<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dploy - My Environments</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="/" class="brand-link">
                    <span class="brand-icon">🚀</span>
                    <span class="brand-name">Dploy.dev</span>
                </a>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    My Environments
                </a>
                <a href="/catalog" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    Catalog
                </a>
            </div>
            <div class="nav-menu">
                <div id="login-form" style="display: none;">
                    <button onclick="login()" class="btn-nav">Login with SSO</button>
                </div>
                <div id="user-info" style="display: none;">
                    <div class="user-badge">
                        <span class="user-icon">👤</span>
                        <span id="username" class="username"></span>
                    </div>
                    <button onclick="logout()" class="btn-logout">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero hero-small">
        <div class="container">
            <h1 class="hero-title">My Environments</h1>
            <p class="hero-subtitle">Manage your running development environments</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <main id="main-content" style="display: none;">
            <!-- Active Environments Section -->
            <section class="section">
                <div class="section-header">
                    <div class="section-title">
                        <h2>Active Environments</h2>
                        <p class="section-description">Your running development environments</p>
                    </div>
                    <div class="section-actions">
                        <div id="env-counter" class="env-counter"></div>
                        <button onclick="loadUserEnvironments()" class="btn-refresh" title="Refresh">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                            </svg>
                        </button>
                        <a href="/catalog" class="btn-nav btn-small">
                            + New Environment
                        </a>
                    </div>
                </div>
                <div id="active-environments" class="env-list">
                    <p class="loading">Loading...</p>
                </div>
            </section>
        </main>

        <!-- Login Required Message -->
        <div id="login-required" class="login-required" style="display: none;">
            <div class="login-card">
                <div class="login-icon">🔐</div>
                <h2>Authentication Required</h2>
                <p>Please sign in with your SSO account to access Dploy</p>
                <button onclick="login()" class="btn-login-large">Login with SSO</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast" class="toast"></div>

    <script src="/static/app.js"></script>
    <script>
        // Page-specific initialization
        window.currentPage = 'environments';
    </script>
</body>
</html>
