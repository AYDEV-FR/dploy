---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: operatorconfigs.dploy.dev
spec:
  group: dploy.dev
  names:
    kind: OperatorConfig
    listKind: OperatorConfigList
    plural: operatorconfigs
    shortNames:
    - opcfg
    singular: operatorconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.defaultEngine
      name: Engine
      type: string
    - jsonPath: .spec.baseDomain
      name: BaseDomain
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: OperatorConfig is the cluster-scoped singleton holding Dploy
          operator defaults.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: OperatorConfigSpec defines cluster-wide defaults for Dploy.
            properties:
              argocd:
                description: ArgoCD holds defaults for the ArgoCD engine.
                properties:
                  namespace:
                    default: argocd
                    description: Namespace is where Application resources are created.
                    type: string
                  project:
                    default: dploy
                    description: Project is the ArgoCD AppProject applied to created
                      Applications.
                    type: string
                  server:
                    default: https://kubernetes.default.svc
                    description: Server is the destination cluster API server.
                    type: string
                type: object
              baseDomain:
                description: BaseDomain is used to build per-instance ingress hostnames
                  (<uuid>.<baseDomain>).
                type: string
              connectionMessageTemplate:
                description: |-
                  ConnectionMessageTemplate is the cluster-wide default instructions template; a
                  DployTemplate may override it. Rendered like connectionURLTemplate plus
                  .URL / .ConnectionURL (the resolved connection target).
                type: string
              connectionURLTemplate:
                description: |-
                  ConnectionURLTemplate is the cluster-wide default Go (text/template) for an
                  instance's public URL. A DployTemplate may override it. Rendered with .Owner,
                  .UUID, .BaseDomain, .Template, .Params and .Claims. When empty the operator
                  falls back to "<uuid>.<baseDomain>".
                type: string
              defaultConnectionType:
                allOf:
                - enum:
                  - web
                  - instructions
                - enum:
                  - web
                  - instructions
                description: |-
                  DefaultConnectionType is the cluster-wide default presentation ("web" or
                  "instructions") for templates that do not set connectionType. Defaults to "web".
                type: string
              defaultEngine:
                default: flux
                description: DefaultEngine selects the engine used when a template
                  does not override it.
                enum:
                - argocd
                - flux
                type: string
              defaults:
                description: Defaults are applied to instances when their template
                  omits the value.
                properties:
                  extendSeconds:
                    default: 7200
                    description: ExtendSeconds is the default seconds added per TTL
                      extension.
                    format: int64
                    type: integer
                  maxExtends:
                    description: MaxExtends is the default maximum number of extensions.
                      -1 means unlimited.
                    type: integer
                  maxInstancesPerUser:
                    default: 5
                    description: MaxInstancesPerUser is the default per-user quota.
                    type: integer
                  ttlSeconds:
                    default: 86400
                    description: TTLSeconds is the default initial lifetime in seconds.
                      -1 means unlimited.
                    format: int64
                    type: integer
                type: object
              flux:
                description: Flux holds defaults for the Flux engine.
                properties:
                  interval:
                    default: 5m
                    description: Interval is the Flux reconcile interval (e.g. "5m").
                    type: string
                  namespace:
                    default: flux-system
                    description: Namespace is where HelmRelease and source resources
                      are created.
                    type: string
                  serviceAccountName:
                    description: ServiceAccountName is the SA Flux impersonates when
                      applying releases.
                    type: string
                type: object
              values:
                description: Values is a free-form map exposed to value templates
                  as `.Config.Values`.
                x-kubernetes-preserve-unknown-fields: true
            type: object
          status:
            description: OperatorConfigStatus reports the observed state of the operator
              configuration.
            properties:
              conditions:
                description: Conditions represent the latest observations of the config's
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
