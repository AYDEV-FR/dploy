---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dploy-api
  namespace: dploy-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dploy-api
rules:
  # Read Environment CRDs
  - apiGroups:
      - dploy.dev
    resources:
      - environments
    verbs:
      - get
      - list
      - watch

  # Manage ArgoCD Applications
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # Read ArgoCD AppProjects
  - apiGroups:
      - argoproj.io
    resources:
      - appprojects
    verbs:
      - get
      - list

  # Manage namespaces (for cleanup when deleting environments)
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dploy-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dploy-api
subjects:
  - kind: ServiceAccount
    name: dploy-api
    namespace: dploy-system
