apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: base-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AYDEV-FR/dploy.git
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
