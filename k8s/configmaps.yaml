---
# ConfigMap for Dploy API configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: dploy-api-config
  namespace: dploy-system
data:
  ARGOCD_NAMESPACE: "argocd"
  ARGOCD_PROJECT: "dploy"
  MAX_ENVIRONMENTS_PER_USER: "5"
  DEFAULT_TTL: "86400"  # 24 hours in seconds
  EXTEND_TTL: "7200"    # 2 hours in seconds
  BASE_DOMAIN: "env.dploy.localhost"
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8080"
  JWT_AUDIENCE: "dploy"
  JWT_USERNAME_CLAIM: "name"
  OIDC_CLIENT_ID: "dploy"
  OIDC_CLIENT_SECRET: "dploy-secret"
  OIDC_REDIRECT_URL: "http://dploy.localhost/auth/callback"

---
# Secret for Dploy API (OIDC backend configuration)
apiVersion: v1
kind: Secret
metadata:
  name: dploy-api-secrets
  namespace: dploy-system
type: Opaque
stringData:
  JWKS_URL: "http://dex.dex.svc.cluster.local:5556/keys"
  JWT_ISSUER: "http://auth.dploy.localhost"
  OIDC_ISSUER: "http://dex.dex.svc.cluster.local:5556"
  OIDC_PUBLIC_ISSUER: "http://auth.dploy.localhost"

---
# Available environments
apiVersion: v1
kind: ConfigMap
metadata:
  name: dploy-environments
  namespace: dploy-system
data:
  environments.yaml: |
    environments:
    
      - name: debian-terminal
        description: "Terminal web pour étudiants"
        chart: "github.com/AYDEV-FR/dploy-charts/webshell@main"
        enabled: true
        icon: "terminal"
        ttl: 300
        # Example with extraValues and variable replacement
        # Supported variables: ${username}, ${user}, ${uuid}, ${ingressHost}, ${ingress}
        extraValues: |
          container:
            image:
              repository: debian
              tag: bookworm
          networkPolicy:
            enabled: false
          ingress:
            enabled: true
            className: "nginx"
            hosts:
              - host: ${ingressHost}
                paths:
                  - path: /
                    pathType: ImplementationSpecific
            tls: []

      - name: ubuntu-terminal
        description: "Terminal web pour étudiants"
        chart: "github.com/AYDEV-FR/dploy-charts/webshell@main"
        enabled: true
        icon: "terminal"
        ttl: 300
        extraValues: |
          container:
            image:
              repository: ubuntu
              tag: latest
          networkPolicy:
            enabled: false
          ingress:
            enabled: true
            className: "nginx"
            hosts:
              - host: ${ingressHost}
                paths:
                  - path: /
                    pathType: ImplementationSpecific
            tls: []

      - name: webterm-toolbox
        description: "Terminal web pour étudiants"
        chart: "github.com/AYDEV-FR/dploy-charts/webshell@main"
        enabled: true
        icon: "terminal"
        ttl: 300
        extraValues: |
          container:
            image:
              repository: aydev/toolbox
              tag: latest
          networkPolicy:
            enabled: false
          ingress:
            enabled: true
            className: "nginx"
            hosts:
              - host: ${ingressHost}
                paths:
                  - path: /
                    pathType: ImplementationSpecific
            tls: []

      - name: kali-desktop
        description: "Kali Desktop"
        chart: "github.com/AYDEV-FR/dploy-charts/kasm@main"
        enabled: true
        icon: "box"
        ttl: 300
        extraValues: |
          image:
            repository: kasmweb/core-kali-rolling
            tag: 1.18.0
          networkPolicy:
            enabled: false
          ingress:
            enabled: true
            className: "nginx"
            hosts:
              - host: ${ingressHost}
                paths:
                  - path: /
                    pathType: ImplementationSpecific
            tls: []

      - name: ubuntu-desktop
        description: "Ubuntu Desktop"
        chart: "github.com/AYDEV-FR/dploy-charts/kasm@main"
        enabled: true
        icon: "box"
        ttl: 300
        extraValues: |
          image:
            repository: kasmweb/ubuntu-noble-desktop
            tag: 1.18.0
          networkPolicy:
            enabled: false
          ingress:
            enabled: true
            className: "nginx"
            hosts:
              - host: ${ingressHost}
                paths:
                  - path: /
                    pathType: ImplementationSpecific
            tls: []

      - name: chromium
        description: "Remote Virtual Browser"
        chart: "github.com/AYDEV-FR/dploy-charts/kasm@main"
        enabled: true
        icon: "web"
        ttl: 300
        extraValues: |
          image:
            repository: kasmweb/chromium
            tag: 1.18.0
          networkPolicy:
            enabled: false
          ingress:
            enabled: true
            className: "nginx"
            hosts:
              - host: ${ingressHost}
                paths:
                  - path: /
                    pathType: ImplementationSpecific
            tls: []