---
# Dploy API Deployment and Service
# ConfigMaps and Secrets are in k8s/configmaps.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: dploy-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dploy-api
  namespace: dploy-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dploy-api
  template:
    metadata:
      labels:
        app: dploy-api
    spec:
      serviceAccountName: dploy-api
      containers:
        - name: api
          image: dploy-api:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: dploy-api-config
            - secretRef:
                name: dploy-api-secrets
          volumeMounts:
            - name: environments
              mountPath: /app/config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      volumes:
        - name: environments
          configMap:
            name: dploy-environments
      securityContext:
        fsGroup: 1000

---
apiVersion: v1
kind: Service
metadata:
  name: dploy-api
  namespace: dploy-system
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: dploy-api
