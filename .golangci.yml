# golangci-lint v2 configuration
# https://golangci-lint.run/usage/configuration/
version: "2"
run:
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errorlint
    - exhaustive
    - gochecknoinits
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tparallel
    - unconvert
    - unparam
    - whitespace
  settings:
    dupl:
      threshold: 150
    exhaustive:
      # A switch with a default branch has made its catch-all explicit;
      # don't also require every enum member to be spelled out.
      default-signifies-exhaustive: true
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
        # controller-runtime passes spec structs by value all over; flagging
        # every 160-byte struct copy is noise for an operator codebase.
        - hugeParam
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 20
    gosec:
      excludes:
        - G104
        - G304
    govet:
      disable:
        - fieldalignment
        # `if err := f(); err != nil` inside a scope that already has an err
        # is idiomatic Go; shadow flags all of them.
        - shadow
      enable-all: true
    misspell:
      locale: US
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dogsled
          - dupl
          - errcheck
          - gocyclo
          - gosec
        path: _test\.go
      # kubebuilder scaffolds init() for scheme registration in api packages
      # and manager entrypoints — that's the supported pattern, not a smell.
      - linters:
          - gochecknoinits
        path: ^(api|cmd)/
      # Reconcile loops are long state machines by design; the complexity
      # budget elsewhere stays at the default.
      - linters:
          - gocyclo
        path: ^internal/controller/
      - linters:
          - all
        path: (.*)\.gen\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
