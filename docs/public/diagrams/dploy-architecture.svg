<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Dploy architecture. The browser talks to the Dploy API which writes DployTemplate and DployInstance custom resources. The operator watches those resources and creates Flux GitRepository, HelmRepository and HelmRelease resources, which install the environment into a per-instance workload namespace. The browser opens the environment URL directly.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Kubernetes cluster boundary -->
  <rect x="40" y="132" width="880" height="440" rx="14" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="58" y="156" fill="#64748b" font-size="13" font-weight="600">Kubernetes cluster</text>

  <!-- Browser (external) -->
  <rect x="70" y="36" width="170" height="60" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="155" y="62" text-anchor="middle" fill="#075985" font-size="14" font-weight="700">User / Browser</text>
  <text x="155" y="81" text-anchor="middle" fill="#0369a1" font-size="11.5">Web UI</text>

  <!-- OIDC provider (external) -->
  <rect x="560" y="36" width="180" height="60" rx="10" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="650" y="62" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="700">OIDC Provider</text>
  <text x="650" y="81" text-anchor="middle" fill="#475569" font-size="11">Authentik · Keycloak · Dex</text>

  <!-- Dploy API -->
  <rect x="70" y="210" width="185" height="86" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="162" y="240" text-anchor="middle" fill="#1e3a8a" font-size="14" font-weight="700">Dploy API</text>
  <text x="162" y="259" text-anchor="middle" fill="#1d4ed8" font-size="11.5">GoFiber + OIDC</text>
  <text x="162" y="281" text-anchor="middle" fill="#1d4ed8" font-size="11" font-style="italic">writes CRs only</text>

  <!-- Custom Resources -->
  <rect x="300" y="196" width="215" height="116" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="407" y="217" text-anchor="middle" fill="#475569" font-size="12.5" font-weight="600">Custom Resources</text>
  <rect x="316" y="228" width="183" height="34" rx="7" fill="#f1f5f9" stroke="#64748b" stroke-width="1.2"/>
  <text x="407" y="250" text-anchor="middle" fill="#334155" font-size="12.5" font-weight="600">DployTemplate</text>
  <rect x="316" y="268" width="183" height="34" rx="7" fill="#f1f5f9" stroke="#64748b" stroke-width="1.2"/>
  <text x="407" y="290" text-anchor="middle" fill="#334155" font-size="12.5" font-weight="600">DployInstance</text>

  <!-- Operator -->
  <rect x="565" y="208" width="190" height="90" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="660" y="237" text-anchor="middle" fill="#4c1d95" font-size="14" font-weight="700">Dploy Operator</text>
  <text x="660" y="256" text-anchor="middle" fill="#6d28d9" font-size="11">DployInstance controller</text>
  <text x="660" y="273" text-anchor="middle" fill="#6d28d9" font-size="11">DployTemplate (pool) controller</text>

  <!-- Flux -->
  <rect x="565" y="380" width="190" height="90" rx="10" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <text x="660" y="408" text-anchor="middle" fill="#115e59" font-size="14" font-weight="700">Flux</text>
  <text x="660" y="427" text-anchor="middle" fill="#0f766e" font-size="11">GitRepository / HelmRepository</text>
  <text x="660" y="444" text-anchor="middle" fill="#0f766e" font-size="11">+ HelmRelease</text>

  <!-- Workload namespace -->
  <rect x="300" y="392" width="215" height="100" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="407" y="420" text-anchor="middle" fill="#7c2d12" font-size="13.5" font-weight="700">Workload namespace</text>
  <text x="407" y="440" text-anchor="middle" fill="#9a3412" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">&lt;owner&gt;-&lt;template&gt;-&lt;uuid&gt;</text>
  <text x="407" y="461" text-anchor="middle" fill="#9a3412" font-size="11.5">Pod · Service · Ingress</text>

  <!-- Browser -> API -->
  <path d="M150,96 L150,210" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="158" y="156" fill="#334155" font-size="11.5">HTTPS + JWT</text>

  <!-- Browser -> OIDC (login) -->
  <path d="M240,60 L558,60" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>
  <text x="399" y="52" text-anchor="middle" fill="#64748b" font-size="11.5">login</text>

  <!-- API -> OIDC (JWKS) -->
  <path d="M214,210 C 320,118 470,104 610,96" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>
  <text x="430" y="128" text-anchor="middle" fill="#64748b" font-size="11.5">validate JWT (JWKS)</text>

  <!-- API -> Custom Resources -->
  <path d="M255,250 L298,250" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="276" y="242" text-anchor="middle" fill="#334155" font-size="11">create / claim</text>

  <!-- Custom Resources -> Operator (watch) -->
  <path d="M515,238 L563,238" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="539" y="231" text-anchor="middle" fill="#334155" font-size="10.5">watch</text>

  <!-- Operator -> Custom Resources (status) -->
  <path d="M563,272 L517,272" fill="none" stroke="#64748b" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>
  <text x="539" y="286" text-anchor="middle" fill="#64748b" font-size="10.5">status</text>

  <!-- Operator -> Flux -->
  <path d="M660,298 L660,378" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="668" y="343" fill="#334155" font-size="11.5">creates</text>

  <!-- Flux -> Workload namespace -->
  <path d="M565,432 L517,432" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="540" y="425" text-anchor="middle" fill="#334155" font-size="10.5">installs</text>

  <!-- Browser -> Workload (open environment URL) -->
  <path d="M70,80 L52,80 L52,470 L298,470" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>
  <text x="60" y="338" fill="#64748b" font-size="11.5">open environment URL</text>
</svg>
