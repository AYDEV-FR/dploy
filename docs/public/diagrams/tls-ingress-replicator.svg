<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Ingress with a wildcard certificate. The cert-manager namespace holds the wildcard Certificate and Secret. A replicator copies the secret into each environment namespace, where each environment has its own Ingress referencing the copied secret.">
  <defs>
    <marker id="ir-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- cert-manager namespace -->
  <rect x="200" y="22" width="360" height="92" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="216" y="44" fill="#4338ca" font-size="12.5" font-weight="700">cert-manager namespace</text>
  <rect x="224" y="56" width="312" height="44" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.3"/>
  <text x="380" y="75" text-anchor="middle" fill="#3730a3" font-size="12.5" font-weight="600">Certificate · Secret</text>
  <text x="380" y="91" text-anchor="middle" fill="#4f46e5" font-size="11" font-family="ui-monospace, Menlo, monospace">wildcard-env-dploy-dev-tls</text>

  <!-- replication label -->
  <text x="392" y="150" text-anchor="middle" fill="#64748b" font-size="11.5" font-style="italic">replicated by annotation (dploy.dev/managed=true)</text>

  <!-- env namespaces -->
  <g>
    <rect x="40" y="212" width="210" height="104" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="56" y="233" fill="#475569" font-size="11.5" font-weight="700">john-webterm namespace</text>
    <rect x="56" y="244" width="178" height="28" rx="6" fill="#e2e8f0" stroke="#64748b" stroke-width="1.1"/>
    <text x="145" y="262" text-anchor="middle" fill="#334155" font-size="11">Secret (copy)</text>
    <rect x="56" y="278" width="178" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.1"/>
    <text x="145" y="296" text-anchor="middle" fill="#166534" font-size="11">Ingress · TLS: wildcard</text>
  </g>
  <g>
    <rect x="275" y="212" width="210" height="104" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="291" y="233" fill="#475569" font-size="11.5" font-weight="700">jane-vscode namespace</text>
    <rect x="291" y="244" width="178" height="28" rx="6" fill="#e2e8f0" stroke="#64748b" stroke-width="1.1"/>
    <text x="380" y="262" text-anchor="middle" fill="#334155" font-size="11">Secret (copy)</text>
    <rect x="291" y="278" width="178" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.1"/>
    <text x="380" y="296" text-anchor="middle" fill="#166534" font-size="11">Ingress · TLS: wildcard</text>
  </g>
  <g>
    <rect x="510" y="212" width="210" height="104" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="526" y="233" fill="#475569" font-size="11.5" font-weight="700">bob-jupyter namespace</text>
    <rect x="526" y="244" width="178" height="28" rx="6" fill="#e2e8f0" stroke="#64748b" stroke-width="1.1"/>
    <text x="615" y="262" text-anchor="middle" fill="#334155" font-size="11">Secret (copy)</text>
    <rect x="526" y="278" width="178" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.1"/>
    <text x="615" y="296" text-anchor="middle" fill="#166534" font-size="11">Ingress · TLS: wildcard</text>
  </g>

  <!-- replication arrows -->
  <path d="M360,114 C 280,160 200,175 145,210" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#ir-arrow)"/>
  <path d="M380,114 L380,210" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#ir-arrow)"/>
  <path d="M400,114 C 480,160 560,175 615,210" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#ir-arrow)"/>
</svg>
