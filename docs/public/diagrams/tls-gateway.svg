<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Gateway API. A single Gateway in the gateway namespace terminates TLS with one wildcard certificate and allows routes from namespaces labelled dploy.dev/managed=true. Each environment namespace has an HTTPRoute with no TLS config that attaches to the Gateway.">
  <defs>
    <marker id="gw-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- gateway namespace -->
  <rect x="150" y="20" width="460" height="100" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="166" y="42" fill="#4338ca" font-size="12.5" font-weight="700">gateway namespace</text>
  <rect x="172" y="52" width="416" height="56" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.3"/>
  <text x="380" y="71" text-anchor="middle" fill="#3730a3" font-size="12.5" font-weight="600">Gateway · listener *.env.dploy.dev</text>
  <text x="380" y="88" text-anchor="middle" fill="#4f46e5" font-size="10.5">TLS: wildcard-env-dploy-dev-tls (single cert)</text>
  <text x="380" y="102" text-anchor="middle" fill="#4f46e5" font-size="10.5">allowedRoutes: dploy.dev/managed=true</text>

  <!-- env namespaces -->
  <g>
    <rect x="40" y="216" width="210" height="92" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="56" y="237" fill="#475569" font-size="11.5" font-weight="700">john-webterm namespace</text>
    <rect x="56" y="252" width="178" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.1"/>
    <text x="145" y="270" text-anchor="middle" fill="#166534" font-size="11.5" font-weight="600">HTTPRoute</text>
    <text x="145" y="285" text-anchor="middle" fill="#15803d" font-size="10">no TLS config</text>
  </g>
  <g>
    <rect x="275" y="216" width="210" height="92" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="291" y="237" fill="#475569" font-size="11.5" font-weight="700">jane-vscode namespace</text>
    <rect x="291" y="252" width="178" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.1"/>
    <text x="380" y="270" text-anchor="middle" fill="#166534" font-size="11.5" font-weight="600">HTTPRoute</text>
    <text x="380" y="285" text-anchor="middle" fill="#15803d" font-size="10">no TLS config</text>
  </g>
  <g>
    <rect x="510" y="216" width="210" height="92" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="526" y="237" fill="#475569" font-size="11.5" font-weight="700">bob-jupyter namespace</text>
    <rect x="526" y="252" width="178" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.1"/>
    <text x="615" y="270" text-anchor="middle" fill="#166534" font-size="11.5" font-weight="600">HTTPRoute</text>
    <text x="615" y="285" text-anchor="middle" fill="#15803d" font-size="10">no TLS config</text>
  </g>

  <!-- attach arrows (HTTPRoute -> Gateway) -->
  <path d="M145,216 C 200,175 280,160 360,120" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#gw-arrow)"/>
  <path d="M380,216 L380,120" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#gw-arrow)"/>
  <path d="M615,216 C 560,175 480,160 400,120" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#gw-arrow)"/>
  <text x="392" y="170" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">attach (parentRef) — TLS terminated at the Gateway</text>
</svg>
