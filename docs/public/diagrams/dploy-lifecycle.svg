<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" width="960" height="280" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="DployInstance lifecycle. Pending leads to Provisioning. From Provisioning an on-demand instance becomes Ready, or a pooled instance becomes Available then Claimed when a user claims it, or it Fails on error. Ready and Claimed instances become Expiring when their TTL elapses and are then Deleted.">
  <defs>
    <marker id="lc-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <!-- Spine -->
  <rect x="40" y="88" width="110" height="44" rx="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="95" y="115" text-anchor="middle" fill="#334155" font-size="13" font-weight="600">Pending</text>

  <rect x="190" y="88" width="136" height="44" rx="22" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="258" y="115" text-anchor="middle" fill="#1e3a8a" font-size="13" font-weight="600">Provisioning</text>

  <rect x="392" y="88" width="110" height="44" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="447" y="115" text-anchor="middle" fill="#166534" font-size="13" font-weight="600">Ready</text>

  <rect x="648" y="88" width="120" height="44" rx="22" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="708" y="115" text-anchor="middle" fill="#7c2d12" font-size="13" font-weight="600">Expiring</text>

  <rect x="812" y="88" width="108" height="44" rx="22" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="866" y="115" text-anchor="middle" fill="#475569" font-size="13" font-weight="600">Deleted</text>

  <!-- Pool branch -->
  <rect x="392" y="196" width="124" height="44" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="454" y="223" text-anchor="middle" fill="#166534" font-size="13" font-weight="600">Available</text>

  <rect x="560" y="196" width="112" height="44" rx="22" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="616" y="223" text-anchor="middle" fill="#065f46" font-size="13" font-weight="600">Claimed</text>

  <!-- Failed -->
  <rect x="190" y="196" width="136" height="44" rx="22" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="258" y="223" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="600">Failed</text>

  <!-- Arrows -->
  <path d="M150,110 L188,110" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#lc-arrow)"/>

  <path d="M326,110 L390,110" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#lc-arrow)"/>
  <text x="358" y="102" text-anchor="middle" fill="#475569" font-size="10.5">on-demand</text>

  <path d="M502,110 L646,110" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#lc-arrow)"/>
  <text x="574" y="102" text-anchor="middle" fill="#475569" font-size="10.5">TTL elapsed</text>

  <path d="M768,110 L810,110" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#lc-arrow)"/>

  <!-- Provisioning -> Available (pool) -->
  <path d="M292,132 L420,194" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#lc-arrow)"/>
  <text x="300" y="170" fill="#475569" font-size="10.5">pool</text>

  <!-- Available -> Claimed -->
  <path d="M516,218 L558,218" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#lc-arrow)"/>
  <text x="537" y="210" text-anchor="middle" fill="#475569" font-size="10.5">claimed</text>

  <!-- Claimed -> Expiring -->
  <path d="M672,212 C 720,196 706,160 708,134" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#lc-arrow)"/>
  <text x="712" y="170" fill="#475569" font-size="10.5">TTL</text>

  <!-- Provisioning -> Failed -->
  <path d="M258,132 L258,194" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#lc-arrow)"/>
  <text x="266" y="170" fill="#475569" font-size="10.5">error</text>
</svg>
