<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" width="720" height="470" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Authentication flow. The browser requests /auth/login; the API redirects to the OIDC provider; the user logs in; the provider redirects back with a code; the browser calls /auth/callback; the API exchanges the code for tokens with the provider; the API redirects back with the token, which the browser stores in localStorage.">
  <defs>
    <marker id="seq-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="seq-arrow-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Lifeline headers -->
  <rect x="60" y="20" width="120" height="40" rx="9" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="120" y="45" text-anchor="middle" fill="#075985" font-size="13" font-weight="700">Browser</text>

  <rect x="300" y="20" width="120" height="40" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="360" y="45" text-anchor="middle" fill="#1e3a8a" font-size="13" font-weight="700">Dploy API</text>

  <rect x="540" y="20" width="120" height="40" rx="9" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="600" y="45" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="700">OIDC Provider</text>

  <!-- Lifelines -->
  <line x1="120" y1="60" x2="120" y2="440" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="360" y1="60" x2="360" y2="440" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="600" y1="60" x2="600" y2="440" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="4 4"/>

  <!-- 1. Browser -> API: /auth/login -->
  <path d="M120,96 L358,96" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#seq-arrow)"/>
  <text x="239" y="89" text-anchor="middle" fill="#334155" font-size="11.5">GET /auth/login</text>

  <!-- 2. API -> Browser: 302 -> OIDC -->
  <path d="M360,132 L122,132" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#seq-arrow-d)"/>
  <text x="241" y="125" text-anchor="middle" fill="#64748b" font-size="11.5">302 → OIDC</text>

  <!-- 3. Browser -> OIDC: authorize -->
  <path d="M120,172 L598,172" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#seq-arrow)"/>
  <text x="359" y="165" text-anchor="middle" fill="#334155" font-size="11.5">authorize (user logs in)</text>

  <!-- 4. OIDC -> Browser: 302 with code -->
  <path d="M600,212 L122,212" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#seq-arrow-d)"/>
  <text x="361" y="205" text-anchor="middle" fill="#64748b" font-size="11.5">302 back with code</text>

  <!-- 5. Browser -> API: /auth/callback -->
  <path d="M120,252 L358,252" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#seq-arrow)"/>
  <text x="239" y="245" text-anchor="middle" fill="#334155" font-size="11.5">GET /auth/callback?code=…</text>

  <!-- 6. API -> OIDC: exchange code -->
  <path d="M360,292 L598,292" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#seq-arrow)"/>
  <text x="479" y="285" text-anchor="middle" fill="#334155" font-size="11.5">exchange code for token</text>

  <!-- 7. OIDC -> API: tokens -->
  <path d="M600,332 L362,332" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#seq-arrow-d)"/>
  <text x="481" y="325" text-anchor="middle" fill="#64748b" font-size="11.5">tokens</text>

  <!-- 8. API -> Browser: 302 with token -->
  <path d="M360,372 L122,372" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#seq-arrow-d)"/>
  <text x="241" y="365" text-anchor="middle" fill="#64748b" font-size="11.5">302 with #token</text>

  <!-- note -->
  <rect x="60" y="400" width="200" height="30" rx="7" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="160" y="419" text-anchor="middle" fill="#475569" font-size="11">stored in localStorage</text>
</svg>
