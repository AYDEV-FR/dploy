name: Bug Report
description: Report a bug in Dploy
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear description of what you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Dploy Version
      description: What version of Dploy are you running?
      placeholder: v1.0.0
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Type
      description: How is Dploy deployed?
      options:
        - Kind (local development)
        - Kubernetes (production)
        - Docker Compose
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please copy and paste any relevant log output
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide:
        - OS (e.g., Ubuntu 22.04)
        - Kubernetes version (e.g., 1.28)
        - ArgoCD version (e.g., 2.10)
      placeholder: |
        - OS: Ubuntu 22.04
        - Kubernetes: 1.28
        - ArgoCD: 2.10

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
